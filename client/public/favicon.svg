<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft drop shadow for the main box -->
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#4f46e5" flood-opacity="0.35"/>
  </filter>
  
  <rect x="8" y="8" width="112" height="112" rx="30" fill="url(#grad_bg)" filter="url(#shadow)"/>
  
  <!-- Outer glowing rings indicating AI / Network -->
  <circle cx="64" cy="64" r="32" stroke="url(#grad_ring)" stroke-width="4" opacity="0.7"/>
  <circle cx="64" cy="64" r="44" stroke="url(#grad_ring)" stroke-width="1.5" opacity="0.3" stroke-dasharray="8 6" />
  
  <!-- Central sleek 'S' logo -->
  <path d="M 76 46 C 76 38 71 34 64 34 C 56 34 52 38 52 46 C 52 53 58 57 64 60 C 71 63 76 68 76 77 C 76 87 71 94 64 94 C 56 94 52 87 52 79" 
        stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- AI Sparks -->
  <circle cx="76" cy="34" r="5" fill="#c7d2fe" />
  <circle cx="52" cy="94" r="5" fill="#c7d2fe" />
  
  <defs>
    <linearGradient id="grad_bg" x1="8" y1="8" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad_ring" x1="20" y1="20" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>